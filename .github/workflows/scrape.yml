name: Daily JobStreet Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: 

# This forces all actions to use Node 24, silencing the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded from 20 to 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        run: node scraper.js
