name: Daily JobStreet Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Upgraded to native Node 24 support

      - name: Setup Node.js
        uses: actions/setup-node@v6 # Upgraded to native Node 24 support
        with:
          node-version: '24' 

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        run: node scraper.js
